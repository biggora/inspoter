name: inspoter-prod
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ghcr.io/biggora/inspoter:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      LIST_PAGE_SIZE: ${LIST_PAGE_SIZE:-50}
      WEBHOOK_RATE_LIMIT: ${WEBHOOK_RATE_LIMIT:-120}
      WEBHOOK_RATE_WINDOW_MS: ${WEBHOOK_RATE_WINDOW_MS:-60000}
      WEBHOOK_MAX_BODY_BYTES: ${WEBHOOK_MAX_BODY_BYTES:-65536}
      WEBHOOK_SCHEDULER_TICK_MS: ${WEBHOOK_SCHEDULER_TICK_MS:-}
      WEBHOOK_DELIVERY_TIMEOUT_MS: ${WEBHOOK_DELIVERY_TIMEOUT_MS:-}
      WEBHOOK_DELIVERY_MAX_ATTEMPTS: ${WEBHOOK_DELIVERY_MAX_ATTEMPTS:-}
      WEBHOOK_DELIVERY_LEASE_MS: ${WEBHOOK_DELIVERY_LEASE_MS:-}
      WEBHOOK_DELIVERY_BATCH: ${WEBHOOK_DELIVERY_BATCH:-}
      OPERATOR_USERNAME: ${OPERATOR_USERNAME:-}
      OPERATOR_PASSWORD_HASH: ${OPERATOR_PASSWORD_HASH:-}
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER:-}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET:-}
      AUTHENTIK_REDIRECT_URI: ${AUTHENTIK_REDIRECT_URI:-}
      MAIL_SYNC_TICK_MS: ${MAIL_SYNC_TICK_MS:-}
      MAIL_INITIAL_SYNC_LIMIT: ${MAIL_INITIAL_SYNC_LIMIT:-}
      MAIL_MAX_ATTACHMENT_BYTES: ${MAIL_MAX_ATTACHMENT_BYTES:-}
      MAIL_SEND_RATE_LIMIT: ${MAIL_SEND_RATE_LIMIT:-}
      MAIL_SEND_RATE_WINDOW_MS: ${MAIL_SEND_RATE_WINDOW_MS:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
    ports:
      - "${APP_PORT:-3800}:3000"

volumes:
  db-data:
