services:
  db-test:
    image: postgres:16
    environment:
      POSTGRES_USER: inspoter_test
      POSTGRES_PASSWORD: local_test_only
      POSTGRES_DB: inspoter_e2e_test
    ports:
      - "127.0.0.1:3833:5432"
    volumes:
      - test-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inspoter_test -d inspoter_e2e_test"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 2s

volumes:
  test-db-data:
