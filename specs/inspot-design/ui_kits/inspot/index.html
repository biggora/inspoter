<!-- @startingPoint section="Inspot" subtitle="Full control-panel app shell + screens" viewport="1280x800" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspot — Панель управления</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.5.0/remixicon.min.css">
<style>
  html,body{margin:0;height:100%;}
  body{font-family:var(--font-body);background:oklch(var(--background-50));color:oklch(var(--foreground-900));}
  #root{height:100vh;}
  a{color:oklch(var(--primary-600));} a:hover{color:oklch(var(--primary-700));}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:oklch(var(--background-300));border-radius:9999px;border:3px solid oklch(var(--background-50));}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="DashboardScreen.jsx"></script>
<script type="text/babel" src="ServersScreen.jsx"></script>
<script type="text/babel" src="LogsScreen.jsx"></script>
<script type="text/babel" src="SettingsScreen.jsx"></script>
<script type="text/babel">
function App() {
  const [authed, setAuthed] = React.useState(false);
  const [route, setRoute] = React.useState('dashboard');
  const [dark, setDark] = React.useState(false);

  React.useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);

  if (!authed) return <window.LoginScreen onLogin={() => setAuthed(true)} />;

  let screen;
  if (route === 'dashboard') screen = <window.DashboardScreen onNavigate={setRoute} />;
  else if (route === 'servers') screen = <window.ServersScreen />;
  else if (route === 'logs') screen = <window.LogsScreen />;
  else if (route === 'settings') screen = <window.SettingsScreen dark={dark} onToggleTheme={() => setDark((d) => !d)} />;
  else screen = <window.PlaceholderScreen title={{ domains: 'Домены', monitoring: 'Мониторинг', backups: 'Бэкапы', mail: 'Почта', alerts: 'Оповещения' }[route] || 'Панель'} />;

  return (
    <window.Shell current={route} onNavigate={setRoute} dark={dark} onToggleTheme={() => setDark((d) => !d)} onLogout={() => { setAuthed(false); setRoute('dashboard'); }}>
      {screen}
    </window.Shell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
