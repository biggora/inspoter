<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.5.0/remixicon.min.css">
<style>
  body{margin:0;padding:22px;font-family:var(--font-body);background:oklch(var(--background-50));color:oklch(var(--foreground-900));}
  .grid{display:flex;flex-direction:column;gap:20px;max-width:660px;}
  .row{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start;}
  .sec{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:oklch(var(--foreground-400));margin-bottom:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Modal, Toast, Dropdown, DropdownItem, DropdownSep, DropdownLabel, Button, IconButton } = window.InspotDesignSystem_abeb6a;
function Demo(){
  const [open,setOpen]=React.useState(false);
  return (
    <div className="grid">
      <div className="row">
        <div>
          <div className="sec">Toasts (inline)</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <Toast variant="success" fixed={false}>Профиль успешно обновлён</Toast>
            <Toast variant="error" fixed={false}>Не удалось запустить сервер</Toast>
            <Toast variant="info" fixed={false}>Скопировано в буфер обмена</Toast>
          </div>
        </div>
        <div>
          <div className="sec">Dropdown</div>
          <Dropdown align="left" trigger={<Button variant="secondary" icon="ri-user-line" iconRight="ri-arrow-down-s-line">admin</Button>}>
            <DropdownLabel>admin · Оператор</DropdownLabel>
            <DropdownItem icon="ri-user-line">Профиль</DropdownItem>
            <DropdownItem icon="ri-settings-4-line">Настройки</DropdownItem>
            <DropdownSep />
            <DropdownItem icon="ri-logout-box-r-line" danger>Выйти</DropdownItem>
          </Dropdown>
        </div>
        <div>
          <div className="sec">Modal</div>
          <Button variant="primary" onClick={()=>setOpen(true)}>Открыть диалог</Button>
        </div>
      </div>
      <Modal open={open} onClose={()=>setOpen(false)} title="Остановить сервер"
        footer={<><Button variant="ghost" onClick={()=>setOpen(false)}>Отмена</Button><Button variant="primary" onClick={()=>setOpen(false)}>Подтвердить</Button></>}>
        Сервер «web-prod-01» будет остановлен. Сервисы на нём станут недоступны.
      </Modal>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
