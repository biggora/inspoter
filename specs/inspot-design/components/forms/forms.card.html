<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.5.0/remixicon.min.css">
<style>
  body{margin:0;padding:22px;font-family:var(--font-body);background:oklch(var(--background-50));color:oklch(var(--foreground-900));}
  .grid{display:flex;flex-direction:column;gap:20px;max-width:640px;}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .sec{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:oklch(var(--foreground-400));margin-bottom:8px;}
  a{color:oklch(var(--primary-600));} a:hover{color:oklch(var(--primary-700));}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, IconButton, Input, Switch, SegmentedControl } = window.InspotDesignSystem_abeb6a;
function Demo(){
  const [on,setOn]=React.useState(true);
  const [range,setRange]=React.useState('24h');
  const [pw,setPw]=React.useState(false);
  return (
    <div className="grid">
      <div>
        <div className="sec">Buttons</div>
        <div className="row">
          <Button variant="primary" icon="ri-add-line">Создать</Button>
          <Button variant="secondary">Отмена</Button>
          <Button variant="ghost" icon="ri-refresh-line">Обновить</Button>
          <Button variant="primary" loading>Сохранение…</Button>
          <Button variant="primary" size="sm">sm</Button>
          <Button variant="secondary" disabled>disabled</Button>
        </div>
      </div>
      <div>
        <div className="sec">Icon buttons</div>
        <div className="row">
          <IconButton icon="ri-moon-line" aria-label="Тема" />
          <IconButton icon="ri-refresh-line" aria-label="Обновить" />
          <IconButton icon="ri-more-2-line" bordered aria-label="Меню" />
          <IconButton icon="ri-close-line" size="sm" aria-label="Закрыть" />
        </div>
      </div>
      <div className="row" style={{alignItems:'flex-start'}}>
        <div style={{flex:1,minWidth:200}}>
          <div className="sec">Inputs</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <Input label="Имя пользователя" placeholder="admin" />
            <Input label="Пароль" type={pw?'text':'password'} defaultValue="secret" trailingIcon={pw?'ri-eye-off-line':'ri-eye-line'} onTrailingClick={()=>setPw(!pw)} />
            <Input leadingIcon="ri-search-line" placeholder="Поиск по логам…" />
          </div>
        </div>
        <div style={{flex:1,minWidth:200}}>
          <div className="sec">Switch · Segmented</div>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <Switch label="Компактный режим" description="Уменьшенные отступы" checked={on} onChange={setOn} />
            <SegmentedControl variant="pill" value={range} onChange={setRange} options={[{value:'1h',label:'1ч'},{value:'6h',label:'6ч'},{value:'24h',label:'24ч'},{value:'7d',label:'7д'}]} />
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
