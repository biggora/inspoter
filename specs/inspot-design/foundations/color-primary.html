<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Terracotta" subtitle="Brand action color (hue 30). Also danger. Ramp 50→950." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;font-family:var(--font-body);background:oklch(var(--background-50));}
  .ramp{display:flex;gap:6px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px;align-items:center;}
  .chip{width:100%;height:60px;border-radius:var(--radius-md);border:1px solid oklch(var(--foreground-950) / .06);}
  .n{font-size:10px;color:oklch(var(--foreground-500));font-family:var(--font-mono);}
</style>
</head>
<body>
  <div class="ramp" id="r"></div>
  <script>
    const steps=[50,100,200,300,400,500,600,700,800,900,950];
    document.getElementById('r').innerHTML = steps.map(s=>
      '<div class="sw"><div class="chip" style="background:oklch(var(--primary-'+s+'))"></div><span class="n">'+s+'</span></div>'
    ).join('');
  </script>
</body>
</html>
