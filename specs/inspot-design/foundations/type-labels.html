<!-- @dsCard group="Type" viewport="700x120" name="Uppercase micro-labels" subtitle="Stat labels & table headers: 11–12px, 0.04em tracking, foreground-400/500." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;font-family:var(--font-body);background:oklch(var(--background-50));display:flex;gap:28px;align-items:center;}
  .u{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:var(--tracking-wide);color:oklch(var(--foreground-500));}
  .th{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:var(--tracking-wide);color:oklch(var(--foreground-400));}
</style>
</head>
<body>
  <span class="u">Серверы</span>
  <span class="u">Оповещения</span>
  <span class="th">Статус</span>
  <span class="th">CPU</span>
  <span class="th">Аптайм</span>
</body>
</html>
