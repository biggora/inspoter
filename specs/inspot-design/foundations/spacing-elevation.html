<!-- @dsCard group="Spacing" viewport="700x150" name="Elevation" subtitle="Border-defined UI. Shadows only on floating layers." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-body);background:oklch(var(--background-100));display:flex;gap:24px;align-items:center;}
  .g{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:150px;height:64px;background:oklch(var(--background-50));border:1px solid oklch(var(--background-200));border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;font-size:12px;color:oklch(var(--foreground-500));}
  .n{font-family:var(--font-mono);font-size:10px;color:oklch(var(--foreground-400));}
</style>
</head>
<body>
  <div class="g"><div class="box">resting card</div><span class="n">border only · no shadow</span></div>
  <div class="g"><div class="box" style="box-shadow:var(--shadow-menu)">menu</div><span class="n">--shadow-menu</span></div>
  <div class="g"><div class="box" style="box-shadow:var(--shadow-modal)">modal</div><span class="n">--shadow-modal</span></div>
</body>
</html>
