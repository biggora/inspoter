<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="8px controls · 12px cards/modals · full pills · 16px wells." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px 20px;font-family:var(--font-body);background:oklch(var(--background-50));display:flex;gap:20px;align-items:center;}
  .g{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:64px;height:52px;background:oklch(var(--secondary-100));border:1px solid oklch(var(--secondary-200));}
  .n{font-family:var(--font-mono);font-size:10px;color:oklch(var(--foreground-400));}
</style>
</head>
<body>
  <div class="g"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="n">sm · 4</span></div>
  <div class="g"><div class="box" style="border-radius:var(--radius-md)"></div><span class="n">md · 6</span></div>
  <div class="g"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="n">lg · 8</span></div>
  <div class="g"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="n">xl · 12</span></div>
  <div class="g"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="n">2xl · 16</span></div>
  <div class="g"><div class="box" style="border-radius:var(--radius-full)"></div><span class="n">full</span></div>
</body>
</html>
