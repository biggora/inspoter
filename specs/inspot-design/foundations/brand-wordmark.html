<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-heading);background:oklch(var(--background-50));display:flex;gap:32px;align-items:center;}
  .word{font-size:28px;font-weight:700;color:oklch(var(--foreground-900));letter-spacing:-0.01em;}
  .tile{width:40px;height:40px;border-radius:var(--radius-md);background:oklch(var(--primary-100));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:oklch(var(--primary-700));}
  .n{font-family:var(--font-mono);font-size:10px;color:oklch(var(--foreground-400));margin-top:8px;}
  .g{display:flex;flex-direction:column;align-items:center;}
</style>
</head>
<body>
  <div class="g"><div class="word">Inspot</div><span class="n">expanded sidebar</span></div>
  <div class="g"><div class="tile">In</div><span class="n">collapsed rail</span></div>
</body>
</html>
