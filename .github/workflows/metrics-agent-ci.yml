name: Metrics agent CI

on:
  pull_request:
    paths:
      - "metrics-agent/**"
  push:
    branches:
      - main
    paths:
      - "metrics-agent/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s metrics-agent/tests -v

      - name: Build Docker image
        run: docker build --tag inspoter-metrics-agent:ci-verify ./metrics-agent

      - name: Verify non-root user
        run: test "$(docker image inspect --format '{{.Config.User}}' inspoter-metrics-agent:ci-verify)" = "agent"

      - name: Validate compose config
        run: docker compose -f metrics-agent/compose.yml config --quiet
